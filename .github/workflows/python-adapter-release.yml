name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: integrations/python-adapter
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Install capsule-run (PyPI)
        working-directory: integrations/python-adapter
        run: pip install capsule-run

      - name: Create sandboxes directory
        working-directory: integrations/python-adapter
        run: mkdir -p capsule_run_adapter/sandboxes

      - name: Build python_sandbox.wasm
        working-directory: integrations/python-adapter
        run: |
          capsule build src/sandbox_py.py --export
          mv src/sandbox_py.wasm capsule_run_adapter/sandboxes/sandbox_py.wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install @capsule-run/cli (npm)
        working-directory: integrations/python-adapter
        run: npm install -g @capsule-run/cli

      - name: Setup package.json for SDK
        working-directory: integrations/python-adapter
        run: |
          echo '{"type": "module"}' > package.json
          npm install @capsule-run/sdk

      - name: Build js_sandbox.wasm
        working-directory: integrations/python-adapter
        run: |
          capsule build src/sandbox_js.ts --export
          mv src/sandbox_js.wasm capsule_run_adapter/sandboxes/sandbox_js.wasm

      - name: Clean up Node.js artifacts
        working-directory: integrations/python-adapter
        run: |
          rm -rf node_modules
          rm -f package.json package-lock.json

      - name: Build package
        working-directory: integrations/python-adapter
        run: python -m build

      - name: Check package
        working-directory: integrations/python-adapter
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: integrations/python-adapter/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
