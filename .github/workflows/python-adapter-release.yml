name: Python Adapter

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true

jobs:
  build-wasm:
    name: Build WebAssembly sandboxes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install capsule-run (PyPI)
        run: pip install capsule-run

      - name: Create sandboxes directory
        working-directory: integrations/python-adapter
        run: mkdir -p capsule_adapter/sandboxes

      - name: Build python_sandbox.wasm
        working-directory: integrations/python-adapter
        run: |
          capsule build src/python_sandbox.py --export
          mv src/python_sandbox.wasm capsule_adapter/sandboxes/python_sandbox.wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install @capsule-run/cli (npm)
        run: npm install -g @capsule-run/cli

      - name: Setup package.json for SDK
        run: |
          echo '{"type": "module"}' > package.json
          npm install @capsule-run/sdk

      - name: Build js_sandbox.wasm
        working-directory: integrations/python-adapter
        run: |
          capsule build src/js_sandbox.ts --export
          mv src/js_sandbox.wasm capsule_adapter/sandboxes/js_sandbox.wasm

      - name: Upload wasm sandboxes
        uses: actions/upload-artifact@v4
        with:
          name: wasm-sandboxes
          path: integrations/python-adapter/capsule_adapter/sandboxes/

      - name: Clean up Node.js artifacts
        run: |
          rm -rf node_modules
          rm -f package.json package-lock.json

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wasm]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create sandboxes directory
        working-directory: integrations/python-adapter
        run: mkdir -p capsule_adapter/sandboxes

      - name: Download wasm sandboxes
        uses: actions/download-artifact@v4
        with:
          name: wasm-sandboxes
          path: integrations/python-adapter/capsule_adapter/sandboxes/

      - name: Install dependencies
        working-directory: integrations/python-adapter
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        working-directory: integrations/python-adapter
        run: python -m build

      - name: Check package
        working-directory: integrations/python-adapter
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: integrations/python-adapter/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: integrations/python-adapter/dist/
