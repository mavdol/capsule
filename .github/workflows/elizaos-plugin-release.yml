name: ElizaOS Plugin Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: false


jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        working-directory: integrations/elizaos-plugin
        run: bun install

      - name: Build
        working-directory: integrations/elizaos-plugin
        run: bun run build

      - name: Publish
        working-directory: integrations/elizaos-plugin
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
